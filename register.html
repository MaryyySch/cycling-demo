<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrierung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        Account erstellen
                    </h3>

                    <form id="registerForm">

                        <!-- Vorname / Nachname -->
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label for="firstname" class="form-label">
                                    Vorname
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="firstname"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="lastname" class="form-label">
                                    Nachname
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="lastname"
                                    required>
                            </div>

                        </div>

                        <!-- Benutzername -->
                        <div class="mb-3">

                            <label for="username" class="form-label">
                                Benutzername
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                required>

                        </div>

                        <!-- E-Mail -->
                        <div class="mb-3">

                            <label for="email" class="form-label">
                                E-Mail
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                required>

                        </div>

                        <!-- Telefon -->
                        <div class="mb-3">

                            <label for="phone" class="form-label">
                                Telefonnummer
                            </label>

                            <input
                                type="tel"
                                class="form-control"
                                id="phone"
                                placeholder="+49..."
                                required>

                        </div>

                        <!-- Straße -->
                        <div class="mb-3">

                            <label for="street" class="form-label">
                                Straße & Hausnummer
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="street"
                                required>

                        </div>

                        <!-- PLZ / Ort -->
                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label for="zip" class="form-label">
                                    PLZ
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="zip"
                                    required>

                            </div>

                            <div class="col-md-8 mb-3">

                                <label for="city" class="form-label">
                                    Ort
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="city"
                                    required>

                            </div>

                        </div>

                        <!-- IBAN -->
                        <div class="mb-3">

                            <label for="iban" class="form-label">
                                IBAN
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="iban"
                                placeholder="DE12 3456 7890 1234 5678 90"
                                maxlength="34"
                                required>

                        </div>

                        <!-- Passwort -->
                        <div class="mb-3">

                            <label for="password" class="form-label">
                                Passwort
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                minlength="8"
                                required>

                        </div>

                        <!-- Passwort wiederholen -->
                        <div class="mb-3">

                            <label for="password2" class="form-label">
                                Passwort wiederholen
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password2"
                                minlength="8"
                                required>

                        </div>

                        <!-- DSGVO -->
                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="privacy"
                                required>

                            <label class="form-check-label" for="privacy">

                                Ich habe die
                                <a href="datenschutz.html" target="_blank">
                                    Datenschutzerklärung
                                </a>
                                gelesen und stimme der Verarbeitung meiner personenbezogenen Daten zu.

                            </label>

                        </div>

                        <!-- Cloudflare Turnstile -->
                        <div class="mb-4">

                            <div
                                class="cf-turnstile"
                                data-sitekey="DEIN_SITE_KEY">
                            </div>

                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Registrieren

                        </button>

                    </form>

                    <p class="text-center mt-4 mb-0">

                        Bereits registriert?

                        <a href="login.html">
                            Zum Login
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const ibanInput = document.getElementById("iban");

ibanInput.addEventListener("input", function () {

    let value = this.value.replace(/\s+/g, "").toUpperCase();

    this.value = value.match(/.{1,4}/g)?.join(" ") || "";

});

document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    const password = document.getElementById("password").value;
    const password2 = document.getElementById("password2").value;
    const privacy = document.getElementById("privacy").checked;

    if(password !== password2){

        alert("Die Passwörter stimmen nicht überein.");
        return;

    }

    if(!privacy){

        alert("Bitte akzeptieren Sie die Datenschutzerklärung.");
        return;

    }

    // Hier sollte serverseitig zusätzlich geprüft werden:
    // - Turnstile CAPTCHA
    // - E-Mail bereits vorhanden
    // - Benutzername bereits vorhanden
    // - IBAN validieren
    // - Passwort sicher speichern

    alert("Registrierung erfolgreich!");

    window.location.href = "login.html";

});

</script>

</body>
</html>
