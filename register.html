<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrierung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h3 class="text-center mb-2">
                        Jetzt Registrieren
                    </h3>

                    <p class="text-center text-muted mb-4">
                        <span class="text-danger">*</span> Pflichtfelder
                    </p>

                    <form id="registerForm">

                        <!-- Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">
                                Name <span class="text-danger">*</span>
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="name"
                                required>
                        </div>

                        <!-- Benutzername -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Benutzername
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="username">
                        </div>

                        <!-- E-Mail -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                E-Mail <span class="text-danger">*</span>
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                required>
                        </div>

                        <!-- Telefonnummer -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">
                                Telefonnummer
                            </label>

                            <input
                                type="tel"
                                class="form-control"
                                id="phone"
                                placeholder="+49 123 456789">
                        </div>

                        <!-- Straße -->
                        <div class="mb-3">
                            <label for="street" class="form-label">
                                Straße & Hausnummer
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="street">
                        </div>

                        <!-- PLZ / Ort -->
                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label for="zip" class="form-label">
                                    PLZ
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="zip">

                            </div>

                            <div class="col-md-8 mb-3">

                                <label for="city" class="form-label">
                                    Ort
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="city">

                            </div>

                        </div>

                        <!-- IBAN -->
                        <div class="mb-3">
                            <label for="iban" class="form-label">
                                IBAN <span class="text-danger">*</span>
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="iban"
                                maxlength="34"
                                placeholder="DE12 3456 7890 1234 5678 90"
                                required>
                        </div>

                        <!-- Passwort -->
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Passwort
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                minlength="8">
                        </div>

                        <!-- Passwort wiederholen -->
                        <div class="mb-3">
                            <label for="password2" class="form-label">
                                Passwort wiederholen
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password2"
                                minlength="8">
                        </div>

                        <!-- DSGVO -->
                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="privacy"
                                required>

                            <label class="form-check-label" for="privacy">
                                Ich habe die
                                <a href="datenschutz.html" target="_blank">
                                    Datenschutzerklärung
                                </a>
                                gelesen und stimme der Verarbeitung meiner personenbezogenen Daten zu.
                                <span class="text-danger">*</span>
                            </label>

                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Registrieren

                        </button>

                    </form>

                    <p class="text-center mt-4 mb-0">

                        Bereits registriert?

                        <a href="login.html">
                            Zum Login
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

// IBAN formatieren
document.getElementById("iban").addEventListener("input", function () {

    let value = this.value.replace(/\s+/g, "").toUpperCase();

    this.value = value.match(/.{1,4}/g)?.join(" ") || "";

});

// Formular prüfen
document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    const password = document.getElementById("password").value;
    const password2 = document.getElementById("password2").value;

    // Nur prüfen, wenn ein Passwort eingegeben wurde
    if(password !== "" || password2 !== ""){

        if(password !== password2){

            alert("Die Passwörter stimmen nicht überein.");
            return;

        }

    }

    if(!document.getElementById("privacy").checked){

        alert("Bitte akzeptieren Sie die Datenschutzerklärung.");
        return;

    }

    alert("Registrierung erfolgreich!");

    // Weiterleitung
    window.location.href = "login.html";

});

</script>

</body>
</html>
