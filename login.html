<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login – Indoor Cycling</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/login.css" rel="stylesheet">


</head>


<body>


<div class="login-card text-center">

<img src="images/logo.png" class="logo">

<h3 class="mb-2">Indoor Cycling SV Freihausen</h3>

<p class="text-light mb-4">
Jetzt einloggen
</p>


<form id="loginForm">


<div class="mb-3">

<input
type="text"
class="form-control"
id="username"
placeholder="Benutzername"
required>

</div>


<div class="mb-3">

<input
type="password"
class="form-control"
id="password"
placeholder="Passwort"
required>

</div>


<button
type="submit"
class="btn btn-login w-100 text-white mb-3">

Login

</button>


<div class="d-flex justify-content-between small">

<a href="forgot-password.html">

Passwort vergessen?

</a>

<a href="register.html">

Registrieren

</a>

</div>


</form>

</div>



<script>

/* wenn bereits eingeloggt */

if(localStorage.getItem("cyclingUser")){
window.location.href="index.html"
}


document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

const username=document.getElementById("username").value
const password=document.getElementById("password").value

if(username && password){

localStorage.setItem("cyclingUser",username)

window.location.href="index.html"

}

})

</script>


</body>

</html>
